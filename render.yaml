services:
  - type: web
    name: construct-management-system
    region: oregon
    env: node
    buildCommand: cd backend && npm install && npx prisma generate
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false