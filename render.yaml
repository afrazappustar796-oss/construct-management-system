services:
  - type: web
    name: construct-management-system
    region: oregon
    env: node
    buildCommand: npm install && npx prisma generate --schema=backend/prisma/schema.prisma
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false